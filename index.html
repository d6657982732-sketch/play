<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лесной спавн: зомби-апокалипсис</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaaaa;
            background: rgba(30, 10, 10, 0.7);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid #ff4a4a;
            font-size: 20px;
            font-weight: bold;
            z-index: 200;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
            letter-spacing: 1px;
        }
        #hud span {
            color: #ffd966;
            margin-left: 10px;
            font-size: 26px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 150;
            pointer-events: none;
            box-shadow: 0 0 10px #ffaa00;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #bbb;
            background: rgba(10, 15, 5, 0.6);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            border: 1px solid #4a6130;
            z-index: 100;
        }
        #ammo {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 12px;
            border-left: 4px solid #ffaa00;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="hud">🧟 ЗОМБИ ОСТАЛОСЬ: <span id="zombie-counter">5</span></div>
    <div id="crosshair"></div>
    <div id="ammo">🔫 ∞ патронов</div>
    <div id="controls-note">
        🖱️ ЛКМ стрелять · WASD движение · Shift бег · Пробел прыжок · мышь осмотр
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Сцена, камера, рендер ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x223322);
        scene.fog = new THREE.Fog(0x223322, 20, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2, 8); // спавн

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sunLight.position.set(20, 30, 10);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x404c38, 0.9);
        scene.add(ambientLight);

        // --- Земля ---
        const groundGeometry = new THREE.CircleGeometry(80, 64);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3a5a3a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Простая трава (частицы) ---
        const grassGeo = new THREE.BufferGeometry();
        const grassPos = [];
        for (let i = 0; i < 1000; i++) {
            const r = 25 * Math.sqrt(Math.random());
            const a = Math.random() * Math.PI * 2;
            const x = Math.cos(a) * r;
            const z = Math.sin(a) * r;
            grassPos.push(x, 0, z);
        }
        grassGeo.setAttribute('position', new THREE.Float32BufferAttribute(grassPos, 3));
        const grassMat = new THREE.PointsMaterial({ color: 0x5f8a5f, size: 0.1 });
        const grass = new THREE.Points(grassGeo, grassMat);
        scene.add(grass);

        // --- Деревья (упрощённые для производительности) ---
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4c3b });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 2.5), trunkMat);
            trunk.position.y = 1.25;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            const leaf1 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.8, 6), leafMat);
            leaf1.position.y = 2.5;
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            group.add(leaf1);
            
            const leaf2 = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.4, 6), leafMat);
            leaf2.position.y = 3.8;
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            group.add(leaf2);
            
            group.position.set(x, 0, z);
            return group;
        }

        // Расставим деревья
        for (let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 4 + Math.random() * 18;
            const x = Math.cos(angle) * dist;
            const z = Math.sin(angle) * dist;
            scene.add(createTree(x, z));
        }
        // добавим несколько близких
        scene.add(createTree(3, 2));
        scene.add(createTree(-2, 4));
        scene.add(createTree(4, -3));
        scene.add(createTree(-4, -2));

        // --- Камни и кусты ---
        for (let i = 0; i < 20; i++) {
            const r = 3 + Math.random() * 15;
            const a = Math.random() * Math.PI * 2;
            const x = Math.cos(a) * r;
            const z = Math.sin(a) * r;
            const bush = new THREE.Mesh(new THREE.SphereGeometry(0.4, 4), new THREE.MeshStandardMaterial({ color: 0x3b6e3b }));
            bush.position.set(x, 0.2, z);
            bush.castShadow = true;
            bush.receiveShadow = true;
            scene.add(bush);
        }

        // --- ПИСТОЛЕТ (от первого лица, модель в руке) ---
        const pistolGroup = new THREE.Group();
        
        // Основное тело (рукоятка)
        const gripGeo = new THREE.BoxGeometry(0.2, 0.4, 0.6);
        const gripMat = new THREE.MeshStandardMaterial({ color: 0x4a2c1a, roughness: 0.4, metalness: 0.3 });
        const grip = new THREE.Mesh(gripGeo, gripMat);
        grip.position.set(0.2, -0.2, -0.5);
        grip.castShadow = true;
        pistolGroup.add(grip);

        // Ствол
        const barrelGeo = new THREE.BoxGeometry(0.15, 0.15, 1.2);
        const barrelMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.8 });
        const barrel = new THREE.Mesh(barrelGeo, barrelMat);
        barrel.position.set(0.2, 0, -1.2);
        barrel.castShadow = true;
        pistolGroup.add(barrel);

        // Курок/затвор
        const slideGeo = new THREE.BoxGeometry(0.18, 0.1, 0.4);
        const slideMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.9 });
        const slide = new THREE.Mesh(slideGeo, slideMat);
        slide.position.set(0.2, 0.1, -0.8);
        slide.castShadow = true;
        pistolGroup.add(slide);

        // Магазин
        const magGeo = new THREE.BoxGeometry(0.18, 0.3, 0.3);
        const magMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
        const mag = new THREE.Mesh(magGeo, magMat);
        mag.position.set(0.2, -0.35, -0.5);
        mag.castShadow = true;
        pistolGroup.add(mag);

        // Дуло
        const muzzleGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.1);
        const muzzleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
        const muzzle = new THREE.Mesh(muzzleGeo, muzzleMat);
        muzzle.rotation.x = Math.PI/2;
        muzzle.position.set(0.2, 0, -1.8);
        muzzle.castShadow = true;
        pistolGroup.add(muzzle);

        pistolGroup.position.set(0.3, -0.2, -0.8); // справа внизу экрана
        pistolGroup.rotation.y = 0.1;
        pistolGroup.rotation.x = 0.1;
        camera.add(pistolGroup); // прикрепляем к камере
        scene.add(camera);

        // --- ЗОМБИ (5 штук) ---
        const zombies = [];
        const zombieSpeed = 0.02;
        const zombieHealth = 1; // с одного выстрела

        function createZombie(x, z) {
            const group = new THREE.Group();
            
            // Тело (туловище)
            const bodyGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x375a3a, emissive: 0x112211 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Голова
            const headGeo = new THREE.SphereGeometry(0.3);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x5f6b5f, emissive: 0x1a2a1a });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.3;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Глаза (красные)
            const eyeGeo = new THREE.SphereGeometry(0.08);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x440000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.12, 1.4, 0.25);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.12, 1.4, 0.25);
            group.add(eyeR);
            
            // Руки (палки)
            const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8);
            const armMat = new THREE.MeshStandardMaterial({ color: 0x2d4a2d });
            const armL = new THREE.Mesh(armGeo, armMat);
            armL.position.set(-0.5, 0.9, 0);
            armL.rotation.z = 0.3;
            armL.castShadow = true;
            group.add(armL);
            const armR = new THREE.Mesh(armGeo, armMat);
            armR.position.set(0.5, 0.9, 0);
            armR.rotation.z = -0.3;
            armR.castShadow = true;
            group.add(armR);
            
            group.position.set(x, 0, z);
            return group;
        }

        // Позиции зомби вокруг спавна
        const spawnPositions = [
            [8, 5], [-6, 9], [12, -7], [-10, -5], [4, -12]
        ];
        
        spawnPositions.forEach(([x, z]) => {
            const zom = createZombie(x, z);
            scene.add(zom);
            zombies.push({ mesh: zom, health: zombieHealth });
        });

        // Счетчик зомби в HUD
        const zombieCounter = document.getElementById('zombie-counter');
        function updateCounter() {
            const alive = zombies.filter(z => z.health > 0).length;
            zombieCounter.textContent = alive;
            if (alive === 0) {
                document.getElementById('hud').style.background = 'rgba(30, 30, 10, 0.8)';
                document.getElementById('hud').style.borderColor = '#aaffaa';
                document.getElementById('hud').innerHTML = '✨ ВЫ ПОБЕДИЛИ! ✨';
            }
        }

        // --- Управление от первого лица ---
        const controls = new PointerLockControls(camera, document.body);
        
        document.addEventListener('click', () => {
            controls.lock();
        });

        // Обработка клавиш
        const moveState = { forward: false, backward: false, left: false, right: false, shift: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const speed = 0.15;

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'ShiftLeft': moveState.shift = true; break;
                case 'Space': if (controls.isLocked) camera.position.y += 0.5; break; // простой прыжок
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyD': moveState.right = false; break;
                case 'ShiftLeft': moveState.shift = false; break;
            }
        });

        // Стрельба по клику
        document.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || !controls.isLocked) return; // только ЛКМ и когда захвачен указатель
            
            // Анимация отдачи
            pistolGroup.position.z += 0.1;
            setTimeout(() => { pistolGroup.position.z -= 0.1; }, 50);

            // Рейкаст для попадания
            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.copy(camera.position);
            raycaster.ray.direction.copy(camera.getWorldDirection(new THREE.Vector3()));
            
            const targets = zombies.filter(z => z.health > 0).map(z => z.mesh);
            const intersects = raycaster.intersectObjects(targets, true); // true для дочерних элементов
            
            if (intersects.length > 0) {
                // Нашли зомби, ищем родителя группы
                let hitObj = intersects[0].object;
                while (hitObj.parent && !zombies.some(z => z.mesh === hitObj)) {
                    hitObj = hitObj.parent;
                }
                const zombieEntry = zombies.find(z => z.mesh === hitObj);
                if (zombieEntry) {
                    zombieEntry.health = 0;
                    scene.remove(zombieEntry.mesh); // убит
                    updateCounter();
                }
            }
        });

        // --- Анимация и движение зомби ---
        function animateZombies() {
            zombies.forEach(z => {
                if (z.health <= 0) return;
                
                // Вектор к игроку
                const dir = new THREE.Vector3().subVectors(camera.position, z.mesh.position);
                dir.y = 0;
                if (dir.length() < 0.5) {
                    // зомби атакует: маленький урон и отбрасывание игрока (просто для эффекта)
                    camera.position.x += dir.normalize().multiplyScalar(-0.5).x;
                    camera.position.z += dir.normalize().multiplyScalar(-0.5).z;
                } else {
                    // движение к игроку
                    dir.normalize().multiplyScalar(zombieSpeed);
                    z.mesh.position.x += dir.x;
                    z.mesh.position.z += dir.z;
                    
                    // поворот мордой к игроку
                    const angle = Math.atan2(dir.x, dir.z);
                    z.mesh.rotation.y = angle;
                }
            });
        }

        // --- Движение игрока ---
        function updatePlayerMovement() {
            if (!controls.isLocked) return;
            
            velocity.x -= velocity.x * 0.1;
            velocity.z -= velocity.z * 0.1;
            
            direction.z = Number(moveState.forward) - Number(moveState.backward);
            direction.x = Number(moveState.right) - Number(moveState.left);
            direction.normalize();
            
            const currentSpeed = moveState.shift ? speed * 1.5 : speed;
            
            if (moveState.forward || moveState.backward) velocity.z += direction.z * currentSpeed;
            if (moveState.left || moveState.right) velocity.x += direction.x * currentSpeed;
            
            controls.moveRight(-velocity.x);
            controls.moveForward(-velocity.z);
            
            // Простая гравитация (чтоб не улетел в небо)
            if (camera.position.y > 2) camera.position.y = 2;
            if (camera.position.y < 2) camera.position.y = 2;
        }

        // --- Цикл анимации ---
        function animate() {
            requestAnimationFrame(animate);
            
            updatePlayerMovement();
            animateZombies();
            
            renderer.render(scene, camera);
        }
        animate();

        // --- Ресайз ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateCounter(); // инициализация счётчика
    </script>
</body>
</html>
