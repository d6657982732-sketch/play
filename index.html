<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лесной спавн: луна и границы</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaaaa;
            background: rgba(30, 10, 10, 0.7);
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid #ff4a4a;
            font-size: 20px;
            font-weight: bold;
            z-index: 200;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
            letter-spacing: 1px;
        }
        #hud span {
            color: #ffd966;
            margin-left: 10px;
            font-size: 26px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 150;
            pointer-events: none;
            box-shadow: 0 0 10px #ffaa00;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ddd;
            background: rgba(10, 15, 5, 0.6);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            border: 1px solid #4a6130;
            z-index: 100;
        }
        #ammo {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 12px;
            border-left: 4px solid #ffaa00;
            z-index: 200;
        }
        #boundary-warning {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffaa66;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 16px;
            border: 1px solid #ffaa66;
            z-index: 250;
            transition: opacity 0.3s;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="hud">🧟 ЗОМБИ ОСТАЛОСЬ: <span id="zombie-counter">5</span></div>
    <div id="crosshair"></div>
    <div id="ammo">🔫 ∞ патронов</div>
    <div id="boundary-warning">⚠️ Край леса! Дальше нельзя</div>
    <div id="controls-note">
        🖱️ ЛКМ стрелять · WASD движение · Shift бег (x2) · Пробел прыжок · мышь осмотр
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Настройки мира ---
        const WORLD_BOUNDARY = 24; // граница леса (радиус)
        const PLAYER_SPEED_NORMAL = 16;
        const PLAYER_SPEED_BOOST = 32;

        // --- Сцена, камера, рендер ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1420); // темное ночное небо
        scene.fog = new THREE.Fog(0x1a2a2a, 30, 70);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2, 8); // спавн

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Освещение (лунный свет) ---
        // Основной лунный свет (холодный, с тенями)
        const moonLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        moonLight.position.set(-20, 20, -15);
        moonLight.castShadow = true;
        moonLight.receiveShadow = true;
        moonLight.shadow.mapSize.width = 1024;
        moonLight.shadow.mapSize.height = 1024;
        moonLight.shadow.camera.near = 1;
        moonLight.shadow.camera.far = 70;
        moonLight.shadow.camera.left = -30;
        moonLight.shadow.camera.right = 30;
        moonLight.shadow.camera.top = 30;
        moonLight.shadow.camera.bottom = -30;
        scene.add(moonLight);

        // Добавочный синеватый свет
        const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
        scene.add(ambientLight);

        // --- Земля с текстурой леса ---
        const groundGeometry = new THREE.CircleGeometry(80, 64);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2a4a2a, roughness: 0.9, emissive: 0x0a1a0a });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Луна в небе ---
        const moonGeometry = new THREE.SphereGeometry(2, 32, 32);
        const moonMaterial = new THREE.MeshStandardMaterial({
            color: 0xfff5d1,
            emissive: 0x332211,
            roughness: 0.4,
            metalness: 0.1
        });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        moon.position.set(30, 25, -40);
        scene.add(moon);

        // Добавим звезды (частицы)
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            const r = 80 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPositions[i*3] = Math.sin(phi) * Math.cos(theta) * r;
            starsPositions[i*3+1] = Math.sin(phi) * Math.sin(theta) * r;
            starsPositions[i*3+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Простая трава ---
        const grassGeo = new THREE.BufferGeometry();
        const grassPos = [];
        for (let i = 0; i < 1500; i++) {
            const r = WORLD_BOUNDARY * Math.sqrt(Math.random());
            const a = Math.random() * Math.PI * 2;
            const x = Math.cos(a) * r;
            const z = Math.sin(a) * r;
            grassPos.push(x, 0, z);
        }
        grassGeo.setAttribute('position', new THREE.Float32BufferAttribute(grassPos, 3));
        const grassMat = new THREE.PointsMaterial({ color: 0x5a8f5a, size: 0.15 });
        const grass = new THREE.Points(grassGeo, grassMat);
        scene.add(grass);

        // --- Деревья (упрощённые) ---
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5a4030 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 2.5), trunkMat);
            trunk.position.y = 1.25;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x1a4a1a, emissive: 0x0a1a0a });
            const leaf1 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.8, 6), leafMat);
            leaf1.position.y = 2.5;
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            group.add(leaf1);
            
            const leaf2 = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.4, 6), leafMat);
            leaf2.position.y = 3.8;
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            group.add(leaf2);
            
            group.position.set(x, 0, z);
            return group;
        }

        // Расставим деревья (в пределах границы)
        for (let i = 0; i < 50; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 3 + Math.random() * (WORLD_BOUNDARY - 2);
            const x = Math.cos(angle) * dist;
            const z = Math.sin(angle) * dist;
            scene.add(createTree(x, z));
        }
        // несколько близких к спавну
        scene.add(createTree(3, 2));
        scene.add(createTree(-2, 4));
        scene.add(createTree(4, -3));
        scene.add(createTree(-4, -2));

        // --- Камни и кусты ---
        for (let i = 0; i < 30; i++) {
            const r = 3 + Math.random() * (WORLD_BOUNDARY - 3);
            const a = Math.random() * Math.PI * 2;
            const x = Math.cos(a) * r;
            const z = Math.sin(a) * r;
            const bush = new THREE.Mesh(new THREE.SphereGeometry(0.4, 4), new THREE.MeshStandardMaterial({ color: 0x2a5a2a }));
            bush.position.set(x, 0.2, z);
            bush.castShadow = true;
            bush.receiveShadow = true;
            scene.add(bush);
        }

        // --- ПИСТОЛЕТ ---
        const pistolGroup = new THREE.Group();
        
        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.4, 0.6), new THREE.MeshStandardMaterial({ color: 0x4a2c1a }));
        grip.position.set(0.2, -0.2, -0.5);
        grip.castShadow = true;
        pistolGroup.add(grip);

        const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 1.2), new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 }));
        barrel.position.set(0.2, 0, -1.2);
        barrel.castShadow = true;
        pistolGroup.add(barrel);

        const slide = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.1, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 }));
        slide.position.set(0.2, 0.1, -0.8);
        slide.castShadow = true;
        pistolGroup.add(slide);

        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        mag.position.set(0.2, -0.35, -0.5);
        mag.castShadow = true;
        pistolGroup.add(mag);

        const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9 }));
        muzzle.rotation.x = Math.PI/2;
        muzzle.position.set(0.2, 0, -1.8);
        muzzle.castShadow = true;
        pistolGroup.add(muzzle);

        pistolGroup.position.set(0.3, -0.2, -0.8);
        pistolGroup.rotation.y = 0.1;
        pistolGroup.rotation.x = 0.1;
        camera.add(pistolGroup);
        scene.add(camera);

        // --- ЗОМБИ (5 штук) ---
        const zombies = [];
        const zombieSpeed = 0.02;

        function createZombie(x, z) {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2), new THREE.MeshStandardMaterial({ color: 0x2a4a2a, emissive: 0x0a1a0a }));
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: 0x4a5a4a }));
            head.position.y = 1.3;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 });
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMat);
            eyeL.position.set(-0.12, 1.4, 0.25);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMat);
            eyeR.position.set(0.12, 1.4, 0.25);
            group.add(eyeR);
            
            const armMat = new THREE.MeshStandardMaterial({ color: 0x2a4a2a });
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8), armMat);
            armL.position.set(-0.5, 0.9, 0);
            armL.rotation.z = 0.3;
            armL.castShadow = true;
            group.add(armL);
            const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8), armMat);
            armR.position.set(0.5, 0.9, 0);
            armR.rotation.z = -0.3;
            armR.castShadow = true;
            group.add(armR);
            
            group.position.set(x, 0, z);
            return group;
        }

        const spawnPositions = [
            [8, 5], [-6, 9], [12, -7], [-10, -5], [4, -12]
        ];
        
        spawnPositions.forEach(([x, z]) => {
            const zom = createZombie(x, z);
            scene.add(zom);
            zombies.push({ mesh: zom, health: 1 });
        });

        // --- Счетчик зомби ---
        const zombieCounter = document.getElementById('zombie-counter');
        function updateCounter() {
            const alive = zombies.filter(z => z.health > 0).length;
            zombieCounter.textContent = alive;
            if (alive === 0) {
                document.getElementById('hud').style.background = 'rgba(30, 30, 10, 0.8)';
                document.getElementById('hud').style.borderColor = '#aaffaa';
                document.getElementById('hud').innerHTML = '✨ ВЫ ПОБЕДИЛИ! ✨';
            }
        }

        // --- Управление от первого лица ---
        const controls = new PointerLockControls(camera, document.body);
        
        document.addEventListener('click', () => {
            controls.lock();
        });

        const moveState = { forward: false, backward: false, left: false, right: false, shift: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'ShiftLeft': moveState.shift = true; break;
                case 'Space': if (controls.isLocked) camera.position.y += 0.5; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyD': moveState.right = false; break;
                case 'ShiftLeft': moveState.shift = false; break;
            }
        });

        // Стрельба
        document.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || !controls.isLocked) return;
            
            pistolGroup.position.z += 0.1;
            setTimeout(() => { pistolGroup.position.z -= 0.1; }, 50);

            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.copy(camera.position);
            raycaster.ray.direction.copy(camera.getWorldDirection(new THREE.Vector3()));
            
            const targets = zombies.filter(z => z.health > 0).map(z => z.mesh);
            const intersects = raycaster.intersectObjects(targets, true);
            
            if (intersects.length > 0) {
                let hitObj = intersects[0].object;
                while (hitObj.parent && !zombies.some(z => z.mesh === hitObj)) {
                    hitObj = hitObj.parent;
                }
                const zombieEntry = zombies.find(z => z.mesh === hitObj);
                if (zombieEntry) {
                    zombieEntry.health = 0;
                    scene.remove(zombieEntry.mesh);
                    updateCounter();
                }
            }
        });

        // --- Анимация зомби ---
        function animateZombies() {
            zombies.forEach(z => {
                if (z.health <= 0) return;
                
                const dir = new THREE.Vector3().subVectors(camera.position, z.mesh.position);
                dir.y = 0;
                if (dir.length() < 0.5) {
                    camera.position.x += dir.normalize().multiplyScalar(-0.5).x;
                    camera.position.z += dir.normalize().multiplyScalar(-0.5).z;
                } else {
                    dir.normalize().multiplyScalar(zombieSpeed);
                    z.mesh.position.x += dir.x;
                    z.mesh.position.z += dir.z;
                    
                    const angle = Math.atan2(dir.x, dir.z);
                    z.mesh.rotation.y = angle;
                }
            });
        }

        // --- Границы мира ---
        const boundaryWarning = document.getElementById('boundary-warning');
        let warningTimeout;

        function applyBoundary() {
            const pos = camera.position;
            const dist = Math.sqrt(pos.x*pos.x + pos.z*pos.z);
            
            if (dist > WORLD_BOUNDARY) {
                // Возвращаем внутрь
                const angle = Math.atan2(pos.x, pos.z);
                camera.position.x = Math.sin(angle) * WORLD_BOUNDARY * 0.98;
                camera.position.z = Math.cos(angle) * WORLD_BOUNDARY * 0.98;
                
                // Показываем предупреждение
                boundaryWarning.style.opacity = '1';
                clearTimeout(warningTimeout);
                warningTimeout = setTimeout(() => {
                    boundaryWarning.style.opacity = '0';
                }, 1000);
            }
        }

        // --- Движение игрока с новой скоростью ---
        function updatePlayerMovement() {
            if (!controls.isLocked) return;
            
            velocity.x -= velocity.x * 0.1;
            velocity.z -= velocity.z * 0.1;
            
            direction.z = Number(moveState.forward) - Number(moveState.backward);
            direction.x = Number(moveState.right) - Number(moveState.left);
            direction.normalize();
            
            const currentSpeed = moveState.shift ? PLAYER_SPEED_BOOST : PLAYER_SPEED_NORMAL;
            
            if (moveState.forward || moveState.backward) velocity.z += direction.z * currentSpeed * 0.01; // масштабируем для плавности
            if (moveState.left || moveState.right) velocity.x += direction.x * currentSpeed * 0.01;
            
            controls.moveRight(-velocity.x);
            controls.moveForward(-velocity.z);
            
            // Гравитация
            if (camera.position.y > 2) camera.position.y = 2;
            if (camera.position.y < 2) camera.position.y = 2;
            
            // Применяем границы
            applyBoundary();
        }

        // --- Цикл анимации ---
        function animate() {
            requestAnimationFrame(animate);
            
            updatePlayerMovement();
            animateZombies();
            
            renderer.render(scene, camera);
        }
        animate();

        // --- Ресайз ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateCounter();
    </script>
</body>
</html>
